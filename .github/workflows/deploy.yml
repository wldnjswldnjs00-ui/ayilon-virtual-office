name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Get Account ID + Create D1 DB + Update wrangler.toml
        run: |
          ACCOUNT_ID=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'])" 2>/dev/null || echo "")
          echo "Account ID: $ACCOUNT_ID"

          curl -s -X POST \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"ayilon-db"}' \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database" || true

          DB_ID=$(curl -s \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/d1/database?name=ayilon-db" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['uuid'])" 2>/dev/null || echo "")
          echo "DB ID: $DB_ID"

          sed -i "s/REPLACE_WITH_YOUR_DB_ID/$DB_ID/" wrangler.toml
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV
          echo "DB_ID=$DB_ID" >> $GITHUB_ENV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Apply DB Schema
        run: wrangler d1 execute ayilon-db --remote --file=worker/schema.sql || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.ACCOUNT_ID }}

      - name: Deploy Worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.ACCOUNT_ID }}

      - name: Set Worker Secrets (OKX + Gemini + GitHub)
        run: |
          # Gemini API Key (optional)
          if [ -n "$GEMINI_KEY" ]; then
            echo "$GEMINI_KEY" | wrangler secret put GEMINI_KEY
          fi

          # OKX credentials (optional - bot runs in simulation if missing)
          if [ -n "$OKX_API_KEY" ]; then
            echo "$OKX_API_KEY"      | wrangler secret put OKX_API_KEY
            echo "$OKX_SECRET_KEY"   | wrangler secret put OKX_SECRET_KEY
            echo "$OKX_PASSPHRASE"   | wrangler secret put OKX_PASSPHRASE
          fi

          # Set OKX_SIM=1 to use OKX demo trading, 0 for real money
          echo "${OKX_SIM:-1}" | wrangler secret put OKX_SIM

          # GitHub PAT for commit monitoring
          if [ -n "$GH_PAT" ]; then
            echo "$GH_PAT" | wrangler secret put GH_PAT
          fi

          # Telegram bot for daily briefings and alerts
          if [ -n "$TG_BOT_TOKEN" ]; then
            echo "$TG_BOT_TOKEN" | wrangler secret put TG_BOT_TOKEN
            echo "$TG_CHAT_ID"   | wrangler secret put TG_CHAT_ID
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.ACCOUNT_ID }}
          GEMINI_KEY:      ${{ secrets.GEMINI_KEY }}
          OKX_API_KEY:     ${{ secrets.OKX_API_KEY }}
          OKX_SECRET_KEY:  ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASSPHRASE:  ${{ secrets.OKX_PASSPHRASE }}
          OKX_SIM:         ${{ secrets.OKX_SIM }}
          GH_PAT:          ${{ secrets.GH_PAT }}
          TG_BOT_TOKEN:    ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
