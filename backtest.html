<body>

<div class="hdr">

  <div class="row">

    <div class="sect">

<script>
// ════════════════════════════════
// INDICATORS
// ════════════════════════════════

function emaArray(arr, p) {
  const r = new Array(arr.length).fill(null);
  if (arr.length < p) return r;
  const k = 2 / (p + 1);
  let v = arr.slice(0, p).reduce((a, b) => a + b, 0) / p;
  r[p - 1] = v;
  for (let i = p; i < arr.length; i++) { v = arr[i] * k + v * (1 - k); r[i] = v; }
  return r;
}

function emaLast(arr, p) {
  if (arr.length < p) return null;
  const k = 2 / (p + 1);
  let v = arr.slice(0, p).reduce((a, b) => a + b, 0) / p;
  for (let i = p; i < arr.length; i++) v = arr[i] * k + v * (1 - k);
  return v;
}

function rsiArray(cl, p = 14) {
  const r = new Array(cl.length).fill(null);
  if (cl.length < p + 1) return r;
  let g = 0, l = 0;
  for (let i = 1; i <= p; i++) { const d = cl[i] - cl[i-1]; if (d > 0) g += d; else l -= d; }
  let ag = g / p, al = l / p;
  r[p] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
  for (let i = p + 1; i < cl.length; i++) {
    const d = cl[i] - cl[i-1];
    ag = (ag * (p-1) + Math.max(0, d)) / p;
    al = (al * (p-1) + Math.max(0, -d)) / p;
    r[i] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
  }
  return r;
}

function atrArray(hi, lo, cl, p = 14) {
  const r = new Array(cl.length).fill(null);
  if (cl.length < p + 1) return r;
  const trs = [];
  for (let i = 1; i < cl.length; i++)
    trs.push(Math.max(hi[i]-lo[i], Math.abs(hi[i]-cl[i-1]), Math.abs(lo[i]-cl[i-1])));
  let a = trs.slice(0, p).reduce((s, v) => s + v, 0) / p;
  r[p] = a;
  for (let i = p; i < trs.length; i++) { a = (a*(p-1)+trs[i])/p; r[i+1] = a; }
  return r;
}

function bbArray(cl, p = 20, m = 2) {
  const r = new Array(cl.length).fill(null);
  for (let i = p - 1; i < cl.length; i++) {
    const sl = cl.slice(i-p+1, i+1);
    const mid = sl.reduce((a,b)=>a+b,0)/p;
    const std = Math.sqrt(sl.reduce((a,b)=>a+(b-mid)**2,0)/p);
    r[i] = { u: mid+m*std, m: mid, l: mid-m*std };
  }
  return r;
}

function adxArray(hi, lo, cl, p = 14) {
  const r = new Array(cl.length).fill(null);
  if (cl.length < p * 2 + 1) return r;
  const pdm=[], ndm=[], tr=[];
  for (let i=1;i<cl.length;i++) {
    const up=hi[i]-hi[i-1], dn=lo[i-1]-lo[i];
    pdm.push(up>dn&&up>0?up:0);
    ndm.push(dn>up&&dn>0?dn:0);
    tr.push(Math.max(hi[i]-lo[i],Math.abs(hi[i]-cl[i-1]),Math.abs(lo[i]-cl[i-1])));
  }
  let sTR=tr.slice(0,p).reduce((a,b)=>a+b,0);
  let sPDM=pdm.slice(0,p).reduce((a,b)=>a+b,0);
  let sNDM=ndm.slice(0,p).reduce((a,b)=>a+b,0);
  const dx=[];
  for (let i=p;i<tr.length;i++) {
    sTR=sTR-sTR/p+tr[i]; sPDM=sPDM-sPDM/p+pdm[i]; sNDM=sNDM-sNDM/p+ndm[i];
    const pdi=sTR>0?100*sPDM/sTR:0, ndi=sTR>0?100*sNDM/sTR:0;
    dx.push((pdi+ndi)>0?100*Math.abs(pdi-ndi)/(pdi+ndi):0);
  }
  if (dx.length < p) return r;
  let adx = dx.slice(0,p).reduce((a,b)=>a+b,0)/p;
  const si = p*2;
  r[si] = adx;
  for (let i=p;i<dx.length;i++) { adx=(adx*(p-1)+dx[i])/p; r[si+(i-p)+1]=adx; }
  return r;
}

function trend4H(cl4h) {
  if (cl4h.length < 55) return 'neutral';
  const price = cl4h[cl4h.length-1];
  const e50 = emaLast(cl4h, 50);
  if (!e50) return 'neutral';
  if (cl4h.length >= 200) {
    const e200 = emaLast(cl4h, 200);
    if (e200) {
      if (e50>e200 && price>e50) return 'bull';
      if (e50<e200 && price<e50) return 'bear';
      return 'neutral';
    }
  }
  const e20 = emaLast(cl4h, 20);
  if (e20) {
    if (e20>e50 && price>e20) return 'bull';
    if (e20<e50 && price<e20) return 'bear';
  }
  return 'neutral';
}

// Pre-compute 4H trend for each 4H candle efficiently
function build4HTrends(cl4h) {
  const e50 = emaArray(cl4h, 50);
  const e200 = emaArray(cl4h, 200);
  const e20 = emaArray(cl4h, 20);
  return cl4h.map((price, i) => {
    if (e50[i] === null) return 'neutral';
    if (e200[i] !== null) {
      if (e50[i]>e200[i] && price>e50[i]) return 'bull';
      if (e50[i]<e200[i] && price<e50[i]) return 'bear';
      return 'neutral';
    }
    if (e20[i] !== null) {
      if (e20[i]>e50[i] && price>e20[i]) return 'bull';
      if (e20[i]<e50[i] && price<e20[i]) return 'bear';
    }
    return 'neutral';
  });
}

// ════════════════════════════════
// STRATEGIES
// ════════════════════════════════

function sigRSITrend(i, cl, rsi, atr, trend) {
  if (rsi[i]===null || atr[i]===null) return null;
  if (trend==='bull' && rsi[i] < 38)
    return {side:'long',  sl:cl[i]-2.0*atr[i], tp:cl[i]+4.0*atr[i], strat:'RSI 추세'};
  if (trend==='bear' && rsi[i] > 62)
    return {side:'short', sl:cl[i]+2.0*atr[i], tp:cl[i]-4.0*atr[i], strat:'RSI 추세'};
  return null;
}

function sigEMACross(i, cl, e9, e21, atr, trend) {
  if (i<1) return null;
  if (e9[i]===null||e21[i]===null||e9[i-1]===null||e21[i-1]===null||atr[i]===null) return null;
  if (trend==='bull' && e9[i-1]<=e21[i-1] && e9[i]>e21[i])
    return {side:'long',  sl:cl[i]-2.0*atr[i], tp:cl[i]+3.0*atr[i], strat:'EMA 교차'};
  if (trend==='bear' && e9[i-1]>=e21[i-1] && e9[i]<e21[i])
    return {side:'short', sl:cl[i]+2.0*atr[i], tp:cl[i]-3.0*atr[i], strat:'EMA 교차'};
  return null;
}

function sigBBRev(i, cl, bb, rsi, atr, trend) {
  if (!bb[i]||rsi[i]===null||atr[i]===null) return null;
  const w = (bb[i].u - bb[i].l) / bb[i].m;
  if (w < 0.008) return null;
  if (trend==='bull' && cl[i]<bb[i].l && rsi[i]<45)
    return {side:'long',  sl:cl[i]-2.0*atr[i], tp:bb[i].m, strat:'BB 반전'};
  if (trend==='bear' && cl[i]>bb[i].u && rsi[i]>55)
    return {side:'short', sl:cl[i]+2.0*atr[i], tp:bb[i].m, strat:'BB 반전'};
  return null;
}

function sigATRTrend(i, cl, e21, atr, adx, rsi, trend) {
  if (e21[i]===null||atr[i]===null||adx[i]===null||rsi[i]===null) return null;
  if (adx[i]<22 || trend==='neutral') return null;
  const pb = Math.abs(cl[i]-e21[i])/atr[i];
  if (pb<0.3||pb>2.5) return null;
  if (trend==='bull' && cl[i]<e21[i] && rsi[i]<55)
    return {side:'long',  sl:cl[i]-2.0*atr[i], tp:cl[i]+3.5*atr[i], strat:'ATR 추세'};
  if (trend==='bear' && cl[i]>e21[i] && rsi[i]>45)
    return {side:'short', sl:cl[i]+2.0*atr[i], tp:cl[i]-3.5*atr[i], strat:'ATR 추세'};
  return null;
}

// ════════════════════════════════
// FETCH
// ════════════════════════════════

async function fetchOKX(instId, bar, count) {
  const all = [];
  let after = '';
  while (all.length < count) {
    const lim = Math.min(300, count - all.length);
    let url = `https://www.okx.com/api/v5/market/history-candles?instId=${instId}&bar=${bar}&limit=${lim}`;
    if (after) url += `&after=${after}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`OKX API 오류: ${res.status}`);
    const d = await res.json();
    if (!d.data || d.data.length === 0) break;
    all.push(...d.data);
    after = d.data[d.data.length-1][0];
    if (d.data.length < lim) break;
    await new Promise(r => setTimeout(r, 150));
  }
  return all.reverse(); // oldest first
}

// ════════════════════════════════
// BACKTEST ENGINE
// ════════════════════════════════

function backtest(c1h, c4h, cfg) {
  const { capital, leverage, posSize, stratName } = cfg;
  const cl = c1h.map(c=>+c[4]), hi = c1h.map(c=>+c[2]), lo = c1h.map(c=>+c[3]);
  const ts = c1h.map(c=>+c[0]);
  const cl4h = c4h.map(c=>+c[4]), ts4h = c4h.map(c=>+c[0]);

  // Indicators
  const RSI  = rsiArray(cl, 14);
  const ATR  = atrArray(hi, lo, cl, 14);
  const E9   = emaArray(cl, 9);
  const E21  = emaArray(cl, 21);
  const BB   = bbArray(cl, 20, 2);
  const ADX  = adxArray(hi, lo, cl, 14);

  // 4H trend per 4H candle
  const tr4h = build4HTrends(cl4h);

  // Map 4H trend to 1H timestamps (two-pointer)
  const trendAt1H = new Array(c1h.length).fill('neutral');
  let p4 = 0;
  for (let i = 0; i < c1h.length; i++) {
    while (p4 + 1 < ts4h.length && ts4h[p4+1] <= ts[i]) p4++;
    if (ts4h[p4] <= ts[i]) trendAt1H[i] = tr4h[p4];
  }

  let equity = capital, peak = capital, mdd = 0;
  const trades = [], stratMap = {};
  let pos = null;
  const WARMUP = 60;

  for (let i = WARMUP; i < cl.length; i++) {
    const price = cl[i], h = hi[i], l = lo[i], t = ts[i], trend = trendAt1H[i];

    // Check open position
    if (pos) {
      let exit = null, win = false;
      if (pos.side === 'long') {
        if (l <= pos.sl) { exit = pos.sl; }
        else if (h >= pos.tp) { exit = pos.tp; win = true; }
      } else {
        if (h >= pos.sl) { exit = pos.sl; }
        else if (l <= pos.tp) { exit = pos.tp; win = true; }
      }
      if (exit !== null) {
        const diff = pos.side==='long' ? exit-pos.entry : pos.entry-exit;
        const pnl = pos.col * leverage * (diff / pos.entry);
        equity += pnl;
        if (equity > peak) peak = equity;
        const dd = (peak - equity) / peak;
        if (dd > mdd) mdd = dd;
        const rec = { strat:pos.strat, side:pos.side, entry:pos.entry, exit, entryTs:pos.ts, exitTs:t, pnl, pnlPct:(diff/pos.entry)*leverage*100, win };
        trades.push(rec);
        if (!stratMap[pos.strat]) stratMap[pos.strat] = [];
        stratMap[pos.strat].push(rec);
        pos = null;
      }
    }

    // New signal
    if (!pos && equity > 0) {
      let sig = null;
      const tryStrat = (fn) => { if (!sig) sig = fn(); };
      if (stratName==='all'||stratName==='rsi_trend') tryStrat(()=>sigRSITrend(i,cl,RSI,ATR,trend));
      if (stratName==='all'||stratName==='ema_cross')  tryStrat(()=>sigEMACross(i,cl,E9,E21,ATR,trend));
      if (stratName==='all'||stratName==='bb_rev')     tryStrat(()=>sigBBRev(i,cl,BB,RSI,ATR,trend));
      if (stratName==='all'||stratName==='atr_trend')  tryStrat(()=>sigATRTrend(i,cl,E21,ATR,ADX,RSI,trend));
      if (sig) {
        const col = equity * (posSize/100);
        pos = { ...sig, entry:price, col, ts:t };
      }
    }
  }

  // Close open position at last price
  if (pos) {
    const lp = cl[cl.length-1], lt = ts[ts.length-1];
    const diff = pos.side==='long' ? lp-pos.entry : pos.entry-lp;
    const pnl = pos.col * leverage * (diff / pos.entry);
    equity += pnl;
    const rec = { strat:pos.strat, side:pos.side, entry:pos.entry, exit:lp, entryTs:pos.ts, exitTs:lt, pnl, pnlPct:(diff/pos.entry)*leverage*100, win:pnl>0 };
    trades.push(rec);
    if (!stratMap[pos.strat]) stratMap[pos.strat] = [];
    stratMap[pos.strat].push(rec);
  }

  const n = trades.length, wins = trades.filter(t=>t.win).length;
  const gp = trades.filter(t=>t.pnl>0).reduce((a,t)=>a+t.pnl,0);
  const gl = Math.abs(trades.filter(t=>t.pnl<0).reduce((a,t)=>a+t.pnl,0));
  const pf = gl>0 ? gp/gl : gp>0 ? 99 : 0;
  const totalRet = (equity-capital)/capital;

  const startMs = ts[WARMUP], endMs = ts[ts.length-1];
  const months = (endMs-startMs)/(1000*60*60*24*30.44);
  const years = months/12;
  const monthlyRet = months>0 ? Math.pow(1+totalRet,1/months)-1 : 0;
  const annualRet = years>0 ? Math.pow(1+totalRet,1/years)-1 : 0;

  return { equity, capital, totalRet, winRate:n>0?wins/n:0, wins, losses:n-wins,
    n, mdd, pf, monthlyRet, annualRet, months, trades, stratMap };
}

// ════════════════════════════════
// UI
// ════════════════════════════════

function pct(v, dec=1) { return (v>=0?'+':'')+((v*100).toFixed(dec))+'%'; }
function money(v) { return (v>=0?'+$':'-$')+Math.abs(v).toFixed(0); }
function fmtTs(ts) {
  const d=new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:00`;
}
function showTab(name) {
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  event.target.classList.add('active');
}
function setClass(el, v) { el.className='val '+(v>0?'pos':v<0?'neg':'neu'); }
function prog(pct, txt) {
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progTxt').textContent=txt;
}

async function runBacktest() {
  const btn = document.getElementById('btnRun');
  const symbol = document.getElementById('symbol').value;
  const stratName = document.getElementById('strategy').value;
  const capital = +document.getElementById('capital').value;
  const leverage = +document.getElementById('leverage').value;
  const posSize = +document.getElementById('posSize').value;
  const count = +document.getElementById('candleCount').value;

  btn.disabled = true; btn.textContent = '실행 중...';
  document.getElementById('progWrap').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  try {
    prog(5, `${symbol} 1H 데이터 불러오는 중... (${count}개)`);
    const c1h = await fetchOKX(symbol, '1H', count);

    prog(55, `${symbol} 4H 데이터 불러오는 중...`);
    const c4h = await fetchOKX(symbol, '4H', 400);

    prog(85, '백테스트 계산 중...');
    await new Promise(r => setTimeout(r, 30));

    const res = backtest(c1h, c4h, { capital, leverage, posSize, stratName });
    prog(100, `완료 · ${res.n}건 거래`);

    document.getElementById('results').style.display = 'block';

    // Summary
    const elTR = document.getElementById('sTotalRet');
    elTR.textContent = pct(res.totalRet); setClass(elTR, res.totalRet);
    document.getElementById('sFinalCap').textContent = `$${res.capital.toFixed(0)} → $${res.equity.toFixed(0)}`;

    const elAnn = document.getElementById('sAnnual');
    elAnn.textContent = pct(res.annualRet); setClass(elAnn, res.annualRet);
    const elMon = document.getElementById('sMonthly');
    elMon.textContent = `월 평균 ${pct(res.monthlyRet)}`;
    elMon.style.color = res.monthlyRet>=0?'#22dd7a':'#ff4560';

    document.getElementById('sWinRate').textContent = (res.winRate*100).toFixed(1)+'%';
    document.getElementById('sWinLoss').textContent = `승 ${res.wins}  /  패 ${res.losses}`;
    document.getElementById('sTrades').textContent = res.n;
    document.getElementById('sTradesPerMonth').textContent = `월 ${(res.n/res.months).toFixed(1)}건`;
    document.getElementById('sPF').textContent = res.pf===99?'∞':res.pf.toFixed(2);
    document.getElementById('sMDD').textContent = '-'+(res.mdd*100).toFixed(1)+'%';

    // Config summary
    const symName = {'BTC-USDT-SWAP':'BTC/USDT','ETH-USDT-SWAP':'ETH/USDT','SOL-USDT-SWAP':'SOL/USDT'}[symbol]||symbol;
    const stratName2 = {'all':'전체','rsi_trend':'RSI 추세','ema_cross':'EMA 교차','bb_rev':'BB 반전','atr_trend':'ATR 추세'}[stratName]||stratName;
    document.getElementById('configSummary').innerHTML = [
      ['심볼', symName], ['전략', stratName2], ['초기 자본', `$${capital}`],
      ['레버리지', `${leverage}x`], ['진입 규모', `자본의 ${posSize}%`],
      ['데이터 기간', `${res.months.toFixed(1)}개월`],
    ].map(([k,v])=>`<div class="info-row"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('');

    // Strategy breakdown
    const sg = document.getElementById('stratGrid');
    const allStrats = Object.entries(res.stratMap);
    if (allStrats.length === 0) {
      sg.innerHTML = '<div style="color:#446;font-size:13px;padding:8px">신호 없음</div>';
    } else {
      sg.innerHTML = allStrats.map(([name, ts]) => {
        const w = ts.filter(t=>t.win).length, tot = ts.length;
        const pnlSum = ts.reduce((a,t)=>a+t.pnl,0);
        return `<div class="strat-card">
          <div class="strat-name">${name}</div>
          <div class="strat-stat"><span class="k">승률</span><span>${tot>0?((w/tot)*100).toFixed(0)+'%':'—'}</span></div>
          <div class="strat-stat"><span class="k">거래수</span><span>${tot}</span></div>
          <div class="strat-stat"><span class="k">PnL</span><span style="color:${pnlSum>=0?'#22dd7a':'#ff4560'}">${pnlSum>=0?'+':''}$${pnlSum.toFixed(0)}</span></div>
        </div>`;
      }).join('');
    }

    // Trade list
    const recent = res.trades.slice(-100).reverse();
    document.getElementById('tradeList').innerHTML = recent.length === 0
      ? '<div style="color:#446;font-size:13px;padding:8px">거래 없음 — 조건이 맞지 않습니다</div>'
      : recent.map(t=>`
      <div class="trade-item">
        <div class="trade-left">
          <div class="strat-tag">${t.strat}</div>
          <div><span class="badge ${t.side==='long'?'badge-long':'badge-short'}">${t.side==='long'?'LONG':'SHORT'}</span></div>
          <div class="dt">${fmtTs(t.entryTs)} → ${fmtTs(t.exitTs)}</div>
        </div>
        <div class="trade-right">
          <div class="trade-pnl ${t.win?'pos':'neg'}">${t.pnl>=0?'+':'-'}$${Math.abs(t.pnl).toFixed(1)}</div>
          <div class="trade-pct">${t.pnlPct>=0?'+':''}${t.pnlPct.toFixed(1)}%</div>
        </div>
      </div>`).join('');

  } catch(e) {
    prog(0, '');
    document.getElementById('progTxt').innerHTML = `<div class="err">오류: ${e.message}</div>`;
    console.error(e);
  }

  btn.disabled = false; btn.textContent = '백테스트 실행';
}
</script>
