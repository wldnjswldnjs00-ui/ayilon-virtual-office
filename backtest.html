/* Trade list */
.ti{background:#0e0e1c;border:1px solid #1a1a28;border-radius:8px;padding:10px 12px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.tl .sn{font-size:10px;font-weight:700}

<script>
// ═══════════════ COSTS ═══════════════
const FEE=0.0005, ENTRY_SLIP=0.0003, SL_SLIP=0.001, FUND_8H=0.0001, MM=0.005, MAX_POS=3, WU=80;

// ═══════════════ INDICATORS ═══════════════
function emaA(a,p){
  const r=new Array(a.length).fill(null);
  if(a.length<p)return r;
  const k=2/(p+1);let v=a.slice(0,p).reduce((s,x)=>s+x,0)/p;
  r[p-1]=v;for(let i=p;i<a.length;i++){v=a[i]*k+v*(1-k);r[i]=v;}return r;
}
function rsiA(cl,p=14){
  const r=new Array(cl.length).fill(null);
  if(cl.length<p+1)return r;
  let g=0,l=0;
  for(let i=1;i<=p;i++){const d=cl[i]-cl[i-1];d>0?g+=d:l-=d;}
  let ag=g/p,al=l/p;r[p]=al===0?100:100-100/(1+ag/al);
  for(let i=p+1;i<cl.length;i++){
    const d=cl[i]-cl[i-1];
    ag=(ag*(p-1)+Math.max(0,d))/p;al=(al*(p-1)+Math.max(0,-d))/p;
    r[i]=al===0?100:100-100/(1+ag/al);
  }return r;
}
function atrA(hi,lo,cl,p=14){
  const r=new Array(cl.length).fill(null);
  if(cl.length<p+1)return r;
  const trs=[];
  for(let i=1;i<cl.length;i++)trs.push(Math.max(hi[i]-lo[i],Math.abs(hi[i]-cl[i-1]),Math.abs(lo[i]-cl[i-1])));
  let a=trs.slice(0,p).reduce((s,v)=>s+v,0)/p;r[p]=a;
  for(let i=p;i<trs.length;i++){a=(a*(p-1)+trs[i])/p;r[i+1]=a;}return r;
}
function bbA(cl,p=20,m=2){
  const r=new Array(cl.length).fill(null);
  for(let i=p-1;i<cl.length;i++){
    const sl=cl.slice(i-p+1,i+1),mid=sl.reduce((a,b)=>a+b,0)/p;
    const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mid)**2,0)/p);
    r[i]={u:mid+m*std,m:mid,l:mid-m*std};
  }return r;
}
function macdA(cl,f=12,s=26,sg=9){
  const ef=emaA(cl,f),es=emaA(cl,s);
  const ml=cl.map((_,i)=>ef[i]!==null&&es[i]!==null?ef[i]-es[i]:null);
  const sl2=new Array(cl.length).fill(null);
  const st=ml.findIndex(v=>v!==null);
  if(st===-1)return cl.map(()=>({m:null,s:null,h:null}));
  const vm=ml.slice(st);if(vm.length<sg)return cl.map(()=>({m:null,s:null,h:null}));
  const k=2/(sg+1);let sv=vm.slice(0,sg).reduce((a,b)=>a+b,0)/sg;
  sl2[st+sg-1]=sv;for(let i=sg;i<vm.length;i++){sv=vm[i]*k+sv*(1-k);sl2[st+i]=sv;}
  return cl.map((_,i)=>({m:ml[i],s:sl2[i],h:ml[i]!==null&&sl2[i]!==null?ml[i]-sl2[i]:null}));
}
function adxA(hi,lo,cl,p=14){
  const r=new Array(cl.length).fill(null);
  if(cl.length<p*2+1)return r;
  const pdm=[],ndm=[],tr=[];
  for(let i=1;i<cl.length;i++){
    const up=hi[i]-hi[i-1],dn=lo[i-1]-lo[i];
    pdm.push(up>dn&&up>0?up:0);ndm.push(dn>up&&dn>0?dn:0);
    tr.push(Math.max(hi[i]-lo[i],Math.abs(hi[i]-cl[i-1]),Math.abs(lo[i]-cl[i-1])));
  }
  let sTR=tr.slice(0,p).reduce((a,b)=>a+b,0),sPD=pdm.slice(0,p).reduce((a,b)=>a+b,0),sND=ndm.slice(0,p).reduce((a,b)=>a+b,0);
  const dx=[];
  for(let i=p;i<tr.length;i++){
    sTR=sTR-sTR/p+tr[i];sPD=sPD-sPD/p+pdm[i];sND=sND-sND/p+ndm[i];
    const pi=sTR>0?100*sPD/sTR:0,ni=sTR>0?100*sND/sTR:0;
    dx.push((pi+ni)>0?100*Math.abs(pi-ni)/(pi+ni):0);
  }
  if(dx.length<p)return r;
  let adx=dx.slice(0,p).reduce((a,b)=>a+b,0)/p;
  const si=p*2;r[si]=adx;
  for(let i=p;i<dx.length;i++){adx=(adx*(p-1)+dx[i])/p;r[si+(i-p)+1]=adx;}
  return r;
}
function build4hTrend(cl4h){
  const e50=emaA(cl4h,50),e200=emaA(cl4h,200),e20=emaA(cl4h,20);
  return cl4h.map((price,i)=>{
    if(!e50[i])return'neutral';
    if(e200[i]){if(e50[i]>e200[i]&&price>e50[i])return'bull';if(e50[i]<e200[i]&&price<e50[i])return'bear';return'neutral';}
    if(e20[i]){if(e20[i]>e50[i]&&price>e20[i])return'bull';if(e20[i]<e50[i]&&price<e20[i])return'bear';}
    return'neutral';
  });
}

// ═══════════════ STRATEGIES ═══════════════
function sScalpRSI(i,ind,tr){
  const{cl,rsi,atr}=ind;if(!rsi[i]||!atr[i])return null;
  if(tr==='bull'&&rsi[i]<28)return{side:'long', sl:cl[i]-2*atr[i],tp:cl[i]+3.5*atr[i]};
  if(tr==='bear'&&rsi[i]>72)return{side:'short',sl:cl[i]+2*atr[i],tp:cl[i]-3.5*atr[i]};
  return null;
}
function sScalpBB(i,ind,tr){
  const{cl,bb,rsi,atr}=ind;if(!bb[i]||!rsi[i]||!atr[i])return null;
  if((bb[i].u-bb[i].l)/bb[i].m<0.004)return null;
  if(tr==='bull'&&cl[i]<bb[i].l&&rsi[i]<38)return{side:'long', sl:cl[i]-2*atr[i],tp:bb[i].m};
  if(tr==='bear'&&cl[i]>bb[i].u&&rsi[i]>62)return{side:'short',sl:cl[i]+2*atr[i],tp:bb[i].m};
  return null;
}
function sScalpCross(i,ind,tr){
  if(i<1)return null;
  const{cl,e9,e21,atr,rsi}=ind;
  if(!e9[i]||!e21[i]||!e9[i-1]||!e21[i-1]||!atr[i]||!rsi[i])return null;
  if(tr==='bull'&&e9[i-1]<=e21[i-1]&&e9[i]>e21[i]&&rsi[i]>40&&rsi[i]<68)
    return{side:'long', sl:cl[i]-2*atr[i],tp:cl[i]+3.5*atr[i]};
  if(tr==='bear'&&e9[i-1]>=e21[i-1]&&e9[i]<e21[i]&&rsi[i]<60&&rsi[i]>32)
    return{side:'short',sl:cl[i]+2*atr[i],tp:cl[i]-3.5*atr[i]};
  return null;
}
function sShortMA(i,ind,tr){
  const{cl,e50,atr,rsi}=ind;if(!e50[i]||!atr[i]||!rsi[i])return null;
  const dist=(cl[i]-e50[i])/e50[i];
  if(tr==='bull'&&dist>-0.006&&dist<0&&rsi[i]<52)return{side:'long', sl:cl[i]-2.5*atr[i],tp:cl[i]+5*atr[i]};
  if(tr==='bear'&&dist<0.006&&dist>0&&rsi[i]>48)return{side:'short',sl:cl[i]+2.5*atr[i],tp:cl[i]-5*atr[i]};
  return null;
}
function sShortBreak(i,ind,tr){
  if(i<21)return null;
  const{cl,hi,lo,vol,atr}=ind;if(!atr[i])return null;
  const h20=Math.max(...hi.slice(i-20,i)),l20=Math.min(...lo.slice(i-20,i));
  const avgV=vol.slice(i-20,i).reduce((a,b)=>a+b,0)/20;
  if(vol[i]<1.8*avgV)return null;
  if(tr==='bull'&&cl[i]>h20)return{side:'long', sl:h20-1.5*atr[i],tp:cl[i]+5*atr[i]};
  if(tr==='bear'&&cl[i]<l20)return{side:'short',sl:l20+1.5*atr[i],tp:cl[i]-5*atr[i]};
  return null;
}
function sShortMACD(i,ind,tr){
  if(i<1)return null;
  const{cl,macd,rsi,atr}=ind;
  if(!macd[i]||macd[i].h===null||!macd[i-1]||macd[i-1].h===null||!atr[i]||!rsi[i])return null;
  if(tr==='bull'&&macd[i-1].h<0&&macd[i].h>0&&rsi[i]<65)return{side:'long', sl:cl[i]-2.5*atr[i],tp:cl[i]+5*atr[i]};
  if(tr==='bear'&&macd[i-1].h>0&&macd[i].h<0&&rsi[i]>35)return{side:'short',sl:cl[i]+2.5*atr[i],tp:cl[i]-5*atr[i]};
  return null;
}
function sSwingRib(i,ind,tr){
  const{cl,e9,e21,e50,atr,rsi}=ind;if(!e9[i]||!e21[i]||!e50[i]||!atr[i]||!rsi[i])return null;
  if(tr==='bull'&&e9[i]>e21[i]&&e21[i]>e50[i]&&rsi[i]<68)return{side:'long', sl:e50[i]-atr[i],tp:cl[i]+5*atr[i]};
  if(tr==='bear'&&e9[i]<e21[i]&&e21[i]<e50[i]&&rsi[i]>32)return{side:'short',sl:e50[i]+atr[i],tp:cl[i]-5*atr[i]};
  return null;
}
function sSwingATR(i,ind,tr){
  const{cl,e21,atr,adx,rsi}=ind;if(!e21[i]||!atr[i]||!adx[i]||!rsi[i])return null;
  if(adx[i]<22||tr==='neutral')return null;
  const pb=Math.abs(cl[i]-e21[i])/atr[i];if(pb<0.3||pb>2.5)return null;
  if(tr==='bull'&&cl[i]<e21[i]&&rsi[i]<55)return{side:'long', sl:cl[i]-2*atr[i],tp:cl[i]+4*atr[i]};
  if(tr==='bear'&&cl[i]>e21[i]&&rsi[i]>45)return{side:'short',sl:cl[i]+2*atr[i],tp:cl[i]-4*atr[i]};
  return null;
}
function sSwingDiv(i,ind,tr){
  if(i<12)return null;
  const{cl,macd,rsi,atr}=ind;if(!macd[i]||macd[i].h===null||!rsi[i]||!atr[i])return null;
  let pli=i-5,phi=i-5;
  for(let j=i-11;j<i-3;j++){if(cl[j]<cl[pli])pli=j;if(cl[j]>cl[phi])phi=j;}
  if(!macd[pli]||macd[pli].h===null||!macd[phi]||macd[phi].h===null)return null;
  if(tr==='bull'&&cl[i]<cl[pli]&&macd[i].h>macd[pli].h&&rsi[i]>28&&rsi[i]<55)
    return{side:'long', sl:cl[i]-2*atr[i],tp:cl[i]+4.5*atr[i]};
  if(tr==='bear'&&cl[i]>cl[phi]&&macd[i].h<macd[phi].h&&rsi[i]<72&&rsi[i]>45)
    return{side:'short',sl:cl[i]+2*atr[i],tp:cl[i]-4.5*atr[i]};
  return null;
}

const ALL_STRATS=[
  {id:'scalp_rsi', cat:'스캘핑', tf:'5m', name:'스캘핑 RSI',       fn:sScalpRSI},
  {id:'scalp_bb',  cat:'스캘핑', tf:'5m', name:'스캘핑 BB반전',    fn:sScalpBB},

  {id:'short_brk', cat:'단타',   tf:'5m', name:'단타 돌파',        fn:sShortBreak},
  {id:'short_macd',cat:'단타',   tf:'5m', name:'단타 MACD',       fn:sShortMACD},
  {id:'swing_rib', cat:'스윙',   tf:'1H', name:'스윙 MA리본',      fn:sSwingRib},

// ═══════════════ FETCH ═══════════════
async function fetchOKX(instId,bar,count){
  const all=[];let after='';
  while(all.length<count){
    const lim=Math.min(300,count-all.length);
    let url=`https://www.okx.com/api/v5/market/history-candles?instId=${instId}&bar=${bar}&limit=${lim}`;
    if(after)url+=`&after=${after}`;
    const res=await fetch(url);
    if(!res.ok)throw new Error(`OKX ${bar} HTTP ${res.status}`);
    const d=await res.json();
    if(!d.data||!d.data.length)break;
    all.push(...d.data);
    after=d.data[d.data.length-1][0];
    if(d.data.length<lim)break;
    await new Promise(r=>setTimeout(r,80));
  }
  return all.reverse();
}

// ═══════════════ ENGINE (single strategy) ═══════════════
function runOneSim(candles, c4h, strat, capital, leverage, posSize, candlesPerFundingPeriod){
  const cl=candles.map(c=>+c[4]),op=candles.map(c=>+c[1]);
  const hi=candles.map(c=>+c[2]),lo=candles.map(c=>+c[3]);
  const vol=candles.map(c=>+c[5]),ts=candles.map(c=>+c[0]);
  const cl4h=c4h.map(c=>+c[4]),ts4h=c4h.map(c=>+c[0]);

  const rsi=rsiA(cl,14),atr=atrA(hi,lo,cl,14);
  const e9=emaA(cl,9),e21=emaA(cl,21),e50=emaA(cl,50);
  const bb=bbA(cl,20,2),adx=adxA(hi,lo,cl,14),macd=macdA(cl,12,26,9);
  const ind={cl,op,hi,lo,vol,rsi,atr,e9,e21,e50,bb,adx,macd};

  const t4h=build4hTrend(cl4h);
  const tmap=new Array(cl.length).fill('neutral');
  let p4=0;
  for(let i=0;i<cl.length;i++){
    while(p4+1<ts4h.length&&ts4h[p4+1]<=ts[i])p4++;
    if(ts4h[p4]<=ts[i])tmap[i]=t4h[p4];
  }

  let equity=capital,peak=capital,mdd=0;
  const openPos=[],trades=[];
  let pending=null;

  for(let i=1;i<cl.length;i++){
    const h=hi[i],l=lo[i],t=ts[i],o=op[i],trend=tmap[i];

    // Execute pending at open[i]
    if(pending&&openPos.length<MAX_POS){
      const slip=pending.side==='long'?(1+ENTRY_SLIP):(1-ENTRY_SLIP);
      const entry=o*slip;
      const col=equity*(posSize/100);
      const notional=col*leverage;
      equity-=notional*FEE;
      const liq=pending.side==='long'?entry*(1-(1-MM)/leverage):entry*(1+(1-MM)/leverage);
      openPos.push({...pending,entry,col,notional,liq,openBar:i,ts:t});
    }
    pending=null;

    // Funding every N candles
    for(const pos of openPos){
      const el=i-pos.openBar;
      if(el>0&&el%candlesPerFundingPeriod===0){
        equity-=pos.notional*(pos.side==='long'?FUND_8H:-FUND_8H*0.5);
      }
    }

    // SL/TP/Liq check
    for(let p=openPos.length-1;p>=0;p--){
      const pos=openPos[p];let exit=null,reason=null;
      if(pos.side==='long'){
        if(l<=pos.liq){exit=pos.liq;reason='청산';}
        else if(l<=pos.sl){exit=pos.sl*(1-SL_SLIP);reason='SL';}
        else if(h>=pos.tp){exit=pos.tp;reason='TP';}
      }else{
        if(h>=pos.liq){exit=pos.liq;reason='청산';}
        else if(h>=pos.sl){exit=pos.sl*(1+SL_SLIP);reason='SL';}
        else if(l<=pos.tp){exit=pos.tp;reason='TP';}
      }
      if(exit!==null){
        const diff=pos.side==='long'?exit-pos.entry:pos.entry-exit;
        const pnl=pos.notional*(diff/pos.entry)-pos.notional*FEE;
        equity+=pnl;
        if(equity>peak)peak=equity;
        const dd=(peak-equity)/peak;if(dd>mdd)mdd=dd;
        trades.push({id:strat.id,name:strat.name,cat:strat.cat,side:pos.side,
          entry:pos.entry,exit,reason,entryTs:pos.ts,exitTs:t,
          pnl,pnlPct:(diff/pos.entry)*leverage*100,win:pnl>0,bars:i-pos.openBar});
        openPos.splice(p,1);
      }
    }

    // Generate signal (only when no open pos for this strat)
    if(i>=WU&&i<cl.length-1&&openPos.length<MAX_POS&&!pending){
      const sig=strat.fn(i,ind,trend);
      if(sig&&!openPos.some(p=>p.side===sig.side)){
        pending={...sig,id:strat.id,name:strat.name,cat:strat.cat};
      }
    }
  }

  // Force-close remaining
  for(const pos of openPos){
    const lp=cl[cl.length-1];
    const diff=pos.side==='long'?lp-pos.entry:pos.entry-lp;
    const pnl=pos.notional*(diff/pos.entry)-pos.notional*FEE;
    equity+=pnl;
    trades.push({id:pos.id,name:pos.name,cat:pos.cat,side:pos.side,
      entry:pos.entry,exit:lp,reason:'종료',entryTs:pos.ts,exitTs:ts[ts.length-1],
      pnl,pnlPct:(diff/pos.entry)*leverage*100,win:pnl>0,bars:cl.length-1-pos.openBar});
  }

  const startMs=ts[WU],endMs=ts[ts.length-1];
  const months=(endMs-startMs)/(864e5*30.44);
  const n=trades.length,wins=trades.filter(t=>t.win).length;
  const totalRet=(equity-capital)/capital;
  const monthlyRet=months>0?Math.pow(1+totalRet,1/months)-1:0;
  const annualRet=months>0?Math.pow(1+totalRet,12/months)-1:0;
  const pnl=equity-capital;
  return{id:strat.id,name:strat.name,cat:strat.cat,tf:strat.tf,
    equity,pnl,totalRet,monthlyRet,annualRet,mdd,months,n,wins,
    winRate:n>0?wins/n:0,tradesPerMonth:months>0?n/months:0,trades};
}

// ═══════════════ STATE ═══════════════
let G_RESULTS=[];
let G_ALL_TRADES=[];

// ═══════════════ MAIN ═══════════════
async function runBacktest(){
  const btn=document.getElementById('btnRun');
  const sym=document.getElementById('symbol').value;
  const capital=+document.getElementById('capital').value;
  const leverage=+document.getElementById('leverage').value;
  const posSize=+document.getElementById('posSize').value;
  const cnt5m=+document.getElementById('period5m').value;
  const cnt1h=+document.getElementById('period1h').value;

  btn.disabled=true;btn.textContent='실행 중...';
  document.getElementById('progWrap').style.display='block';
  document.getElementById('results').style.display='none';

  try{
    prog(5,`${sym} 4H 데이터 로딩...`);
    const c4h=await fetchOKX(sym,'4H',500);

    prog(10,`${sym} 5분봉 로딩... (${cnt5m}개)`);
    const c5m=await fetchOKX(sym,'5m',cnt5m);

    prog(50,`${sym} 1시간봉 로딩... (${cnt1h}개)`);
    const c1h=await fetchOKX(sym,'1H',cnt1h);

    prog(70,'각 전략 시뮬레이션 중...');
    await new Promise(r=>setTimeout(r,20));

    G_RESULTS=[];
    G_ALL_TRADES=[];

    for(let si=0;si<ALL_STRATS.length;si++){
      const s=ALL_STRATS[si];
      prog(70+Math.round(si/ALL_STRATS.length*28), `${s.name} 계산 중...`);
      const candles=s.tf==='5m'?c5m:c1h;
      const cpf=s.tf==='5m'?96:8;
      const r=runOneSim(candles,c4h,s,capital,leverage,posSize,cpf);
      G_RESULTS.push(r);
      G_ALL_TRADES.push(...r.trades);
      await new Promise(r2=>setTimeout(r2,5));
    }

    G_ALL_TRADES.sort((a,b)=>a.entryTs-b.entryTs);
    prog(100,'완료!');

    renderStrategyList();
    renderTrades('all');
    renderTradeFilters();
    document.getElementById('results').style.display='block';
  }catch(e){
    prog(0,'');
    document.getElementById('progTxt').innerHTML=`<div class="err">오류: ${e.message}</div>`;
    console.error(e);
  }
  btn.disabled=false;btn.textContent='백테스트 실행';
}

// ═══════════════ UI ═══════════════
function prog(pct,txt){document.getElementById('progBar').style.width=pct+'%';document.getElementById('progTxt').textContent=txt;}
function pf(v,d=1,sign=true){return(sign&&v>=0?'+':'')+((v*100).toFixed(d))+'%';}
function fts(ms){const d=new Date(ms);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function showTab(name,el){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('pane-'+name).classList.add('on');el.classList.add('on');
}
function catBadge(cat){
  const map={'스캘핑':'cb-scalp','단타':'cb-short','스윙':'cb-swing'};
  return`<span class="cat-badge ${map[cat]||''}">${cat}</span>`;
}

function renderStrategyList(){
  const key=document.getElementById('sortKey').value;
  const sorted=[...G_RESULTS].sort((a,b)=>{
    if(key==='ann')return b.annualRet-a.annualRet;
    if(key==='mon')return b.monthlyRet-a.monthlyRet;
    if(key==='wr')return b.winRate-a.winRate;
    if(key==='n')return b.n-a.n;
    return 0;
  });

  const html=sorted.map((r,rank)=>{
    const mRet=pf(r.monthlyRet);
    const aRet=pf(r.annualRet);
    const mCol=r.monthlyRet>=0?'#1ec96e':'#ff4560';
    const aCol=r.annualRet>=0?'#1ec96e':'#ff4560';
    const pnlCol=r.pnl>=0?'#1ec96e':'#ff4560';
    const confPct=Math.min(100,r.n/10);
    const confCls=r.n<50?'conf-low':r.n<200?'conf-mid':'conf-high';
    const confTxt=r.n<50?`⚠ 거래 ${r.n}건 — 신뢰도 낮음`:r.n<200?`△ 거래 ${r.n}건 — 보통`:`✓ 거래 ${r.n}건 — 신뢰도 높음`;
    const confTxtCol=r.n<50?'#ff4560':r.n<200?'#f7b731':'#1ec96e';
    return`<div class="sitem">
      <div class="sitem-top">
        <div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:13px;color:#556;font-weight:700">#${rank+1}</span>
            <div class="sitem-name">${r.name}</div>
          </div>
          <div style="margin-top:4px;display:flex;gap:4px;align-items:center">
            ${catBadge(r.cat)}
            <span style="font-size:10px;color:#446">${r.tf} &nbsp;|&nbsp; ${r.months.toFixed(0)}개월</span>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:24px;font-weight:700;color:${aCol};line-height:1">${aRet}</div>
          <div style="font-size:10px;color:#446;margin-top:3px">연 복리 수익률</div>
        </div>
      </div>
      <div class="sitem-grid">
        <div class="metric">
          <div class="mk">월 수익률</div>
          <div class="mv" style="color:${mCol}">${mRet}</div>
        </div>
        <div class="metric">
          <div class="mk">총 수익률</div>
          <div class="mv" style="color:${pnlCol}">${pf(r.totalRet)}</div>
        </div>
      </div>
      <div class="sitem-3" style="margin-top:6px">
        <div class="metric">
          <div class="mk">승률</div>
          <div class="mv sm">${r.n>0?(r.winRate*100).toFixed(1)+'%':'—'}</div>
        </div>
        <div class="metric">
          <div class="mk">총 거래 수</div>
          <div class="mv sm" style="font-weight:800">${r.n}건</div>
        </div>
        <div class="metric">
          <div class="mk">월 거래 수</div>
          <div class="mv sm">${r.tradesPerMonth.toFixed(1)}건</div>
        </div>
      </div>
      <div class="sitem-3" style="margin-top:6px">
        <div class="metric">
          <div class="mk">MDD</div>
          <div class="mv sm neg">-${(r.mdd*100).toFixed(1)}%</div>
        </div>
        <div class="metric">
          <div class="mk">순이익</div>
          <div class="mv sm" style="color:${pnlCol}">${r.pnl>=0?'+':''}$${r.pnl.toFixed(0)}</div>
        </div>
        <div class="metric">
          <div class="mk">승 / 패</div>
          <div class="mv sm">${r.wins} / ${r.n-r.wins}</div>
        </div>
      </div>
      <div style="background:#080810;border-radius:6px;padding:7px 9px;margin-top:6px">
        <div class="conf-bar ${confCls}" style="width:${confPct}%"></div>
        <div class="conf-label" style="color:${confTxtCol}">${confTxt}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('stratList').innerHTML=html||'<div class="no-trades">결과 없음</div>';
}

let G_FILTER='all';
function renderTradeFilters(){
  const chips=[{k:'all',l:'전체'},
    ...ALL_STRATS.map(s=>({k:s.id,l:s.name}))
  ];
  document.getElementById('tradeFilters').innerHTML=chips.map(c=>
    `<div class="fchip ${G_FILTER===c.k?'on':''}" onclick="setFilter('${c.k}')">${c.l}</div>`
  ).join('');
}
function setFilter(k){
  G_FILTER=k;
  renderTradeFilters();
  renderTrades(k);
}
function renderTrades(filter){
  const trades=filter==='all'?G_ALL_TRADES:G_ALL_TRADES.filter(t=>t.id===filter);
  const recent=trades.slice(-120).reverse();
  const map={'스캘핑':'cb-scalp','단타':'cb-short','스윙':'cb-swing'};
  document.getElementById('tradeList').innerHTML=!recent.length
    ?`<div class="no-trades">거래 없음</div>`
    :recent.map(t=>`<div class="ti">
      <div class="tl">
        <div style="display:flex;align-items:center;gap:5px">
          <span class="sn" style="font-size:11px;font-weight:700">${t.name}</span>
          <span class="cat-badge ${map[t.cat]||''}" style="font-size:9px">${t.cat}</span>
        </div>
        <div><span class="badge ${t.side==='long'?'bl':'bs'}">${t.side==='long'?'LONG':'SHORT'}</span></div>
        <div class="dt">${fts(t.entryTs)} → ${fts(t.exitTs)}</div>
        <div class="reason">${t.reason==='TP'?'✅ TP':'⛔ '+t.reason} &nbsp;(${t.bars}봉)</div>
      </div>
      <div class="tr">
        <div class="tp2 ${t.win?'pos':'neg'}">${t.pnl>=0?'+':'-'}$${Math.abs(t.pnl).toFixed(1)}</div>
        <div class="tpct">${t.pnlPct>=0?'+':''}${t.pnlPct.toFixed(1)}%</div>
      </div>
    </div>`).join('');
}
</script>
