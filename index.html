<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>AYILON</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif}
body{display:flex;flex-direction:column}

/* ═══ HEADER ═══ */
#hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;height:42px;border-bottom:1px solid rgba(255,255,255,.06);
  background:#000;flex-shrink:0;z-index:20
}
.hdr-l{display:flex;align-items:center;gap:10px}
.logo{font-size:12px;font-weight:900;letter-spacing:.35em;color:#fff}
.day-time{display:flex;align-items:center;gap:6px}
.day-badge{font-size:8px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:2px 6px;font-family:monospace}
.hdr-r{display:flex;align-items:center;gap:8px}
.live-dot{width:5px;height:5px;border-radius:50%;background:#fff;opacity:.9;animation:blink 2s infinite}
.agents-btn{font-size:8px;font-weight:700;letter-spacing:.06em;color:#000;background:#fff;border:none;border-radius:4px;padding:3px 9px;cursor:pointer}
.lvl-txt{font-size:8px;color:rgba(255,255,255,.3);letter-spacing:.06em}
@keyframes blink{0%,100%{opacity:.9}50%{opacity:.2}}

/* ═══ MAIN SPLIT ═══ */
#main{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── LEFT PANEL (chat) ── */
#left{
  width:260px;flex-shrink:0;display:flex;flex-direction:column;
  border-right:1px solid rgba(255,255,255,.06);background:#000;
}
/* On narrow mobile, left hides unless feed tab active */
@media(max-width:640px){
  #left{display:none;position:fixed;inset:42px 0 52px;width:100%;z-index:15;background:#000}
  #left.mob-on{display:flex}
  #right{flex:1}
}

.panel-hdr{
  padding:10px 14px 8px;border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0
}
.panel-ttl{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.feed-cnt{font-size:8px;color:rgba(255,255,255,.2);font-family:monospace}

/* CEO command box */
.cmd-box{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.cmd-who{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.cmd-av{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:11px}
.cmd-label{font-size:8px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.4)}
.cmd-gemini{font-size:7px;color:rgba(255,255,255,.2);margin-left:auto}
.cmd-row{display:flex;gap:6px}
.cmd-in{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:7px 9px;color:#fff;font-size:11px;outline:none}
.cmd-in::placeholder{color:rgba(255,255,255,.2)}
.cmd-in:focus{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.07)}
.cmd-send{background:#fff;color:#000;border:none;border-radius:5px;padding:7px 11px;font-size:9px;font-weight:800;letter-spacing:.06em;cursor:pointer;white-space:nowrap}

/* Feed list */
.feed-list{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:none}
.feed-list::-webkit-scrollbar{display:none}
.fi{padding:8px 12px;display:flex;gap:8px;border-bottom:1px solid rgba(255,255,255,.04);cursor:default}
.fi:hover{background:rgba(255,255,255,.02)}
.fi-av{font-size:14px;flex-shrink:0;margin-top:1px}
.fi-body{flex:1;min-width:0}
.fi-top{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.fi-who{font-size:8px;font-weight:700;color:rgba(255,255,255,.8)}
.fi-team{font-size:7px;color:rgba(255,255,255,.2)}
.fi-ts{font-size:7px;color:rgba(255,255,255,.15);margin-left:auto;font-family:monospace}
.fi-msg{font-size:9px;color:rgba(255,255,255,.5);line-height:1.5}
.fi.ai-msg .fi-msg{color:rgba(255,255,255,.8)}
.fi.cmd-msg .fi-msg{color:#fff}
.fi-tag{font-size:7px;letter-spacing:.04em;color:rgba(255,255,255,.25);margin-top:2px;display:block}

/* ── RIGHT PANEL (office) ── */
#right{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#000}

/* Office top bar */
#office-bar{
  padding:6px 12px;border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  font-family:monospace
}
.ob-chip{font-size:7px;font-weight:700;letter-spacing:.08em;padding:2px 6px;border-radius:2px;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.25)}
.ob-chip.ok{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2)}
.ob-chip.warn{color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.12)}
.ob-stat{font-size:8px;color:rgba(255,255,255,.25)}
.ob-stat b{color:rgba(255,255,255,.7)}
.ob-time{font-size:8px;color:rgba(255,255,255,.2);margin-left:auto}

/* Office scroll area */
#office-scroll{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;position:relative}
#office-scroll::-webkit-scrollbar{display:none}

/* Canvas container */
#office-wrap{position:relative;width:100%}
#office-canvas{display:block;width:100%;height:auto;image-rendering:pixelated}

/* Characters overlay */
#char-layer{position:absolute;inset:0;pointer-events:none}
.spr{
  position:absolute;left:0;top:0;
  will-change:transform;transition:transform 2s cubic-bezier(.45,.05,.55,.95);
  display:flex;flex-direction:column;align-items:center;gap:1px;
  pointer-events:auto;cursor:pointer;z-index:10
}
.spr-body{
  width:20px;height:20px;border-radius:3px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;
  animation:spr-idle 1.2s steps(2,end) infinite
}
.spr.is-ceo .spr-body{width:26px;height:26px;font-size:14px;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.07)}
.spr.active .spr-body{border-color:rgba(255,255,255,.4);box-shadow:0 0 8px rgba(255,255,255,.12)}
.spr.walking .spr-body{animation:spr-walk .5s steps(2,end) infinite}
.spr-shad{width:14px;height:3px;background:rgba(0,0,0,.5);border-radius:50%;margin-top:1px}
.spr.is-ceo .spr-shad{width:18px}
.spr-lbl{font-size:6px;font-weight:700;letter-spacing:.04em;color:rgba(255,255,255,.6);white-space:nowrap}
.spr.active .spr-lbl{color:#fff}
@keyframes spr-idle{0%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes spr-walk{0%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-3px) rotate(6deg)}}
/* speech bubble */
.spr-bub{
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:rgba(10,10,10,.95);border:1px solid rgba(255,255,255,.15);border-radius:5px;
  padding:4px 7px;font-size:7px;color:rgba(255,255,255,.75);
  max-width:120px;text-align:center;line-height:1.4;white-space:normal;
  pointer-events:none;opacity:0;transition:opacity .2s;z-index:30
}
.spr-bub::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:rgba(255,255,255,.15)}
.spr:hover .spr-bub,.spr.talking .spr-bub{opacity:1}
.spr-bub.ai-bub{color:#fff;border-color:rgba(255,255,255,.3)}

/* ═══ BOTTOM NAV (mobile) ═══ */
#nav{display:none;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;background:#000}
@media(max-width:640px){#nav{display:flex}}
.nb{flex:1;padding:8px 4px 11px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;color:rgba(255,255,255,.2);cursor:pointer;transition:color .2s;border-right:1px solid rgba(255,255,255,.04)}
.nb:last-child{border-right:none}
.nb.on{color:#fff}
.nb-ic{font-size:18px}
.nb-lb{font-size:7px;font-weight:700;letter-spacing:.08em}

/* ═══ TRADING / SETTINGS OVERLAYS ═══ */
#overlay{display:none;position:fixed;inset:42px 0 0;background:#000;z-index:10;overflow-y:auto}
#overlay.on{display:block}
.ov-hdr{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between}
.ov-ttl{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.ov-close{font-size:16px;color:rgba(255,255,255,.3);background:none;border:none;cursor:pointer}
.ov-body{padding:12px 14px}
.sec{margin-bottom:16px}
.sec-t{font-size:8px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.06)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.pc{border:1px solid rgba(255,255,255,.06);border-radius:5px;padding:10px 12px}
.pc .pl{font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:4px}
.pc .pv{font-size:18px;font-weight:900;font-family:monospace;color:#fff}
.row{border:1px solid rgba(255,255,255,.06);border-radius:5px;padding:7px 10px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.row-s{font-size:10px;font-weight:700;font-family:monospace}
.row-d{font-size:8px;font-weight:700;letter-spacing:.05em;padding:2px 6px;border:1px solid rgba(255,255,255,.08);border-radius:2px;color:rgba(255,255,255,.5)}
.row-p{font-size:11px;font-weight:800;font-family:monospace}
.sr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.sr:last-child{border-bottom:none}
.sr-l{font-size:10px;color:rgba(255,255,255,.4)}
.sr-v{font-size:9px;color:rgba(255,255,255,.2);font-family:monospace}
.sr-v.ok{color:rgba(255,255,255,.8)}.sr-v.er{color:rgba(255,255,255,.3)}
.ar{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.ar:last-child{border-bottom:none}
.ar-ic{font-size:16px}
.ar-i{flex:1}
.ar-n{font-size:10px;font-weight:700}
.ar-s{font-size:8px;color:rgba(255,255,255,.25)}
.ar-lv{font-size:8px;color:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.08);border-radius:2px;padding:1px 5px;font-family:monospace}

.loading{padding:20px;text-align:center;color:rgba(255,255,255,.15);font-size:9px;letter-spacing:.1em}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div class="hdr-l">
    <div class="logo">AYILON</div>
    <div class="day-time">
      <div class="day-badge">DAY <span id="day-n">1</span></div>
      <div class="day-badge" id="hdr-time">--:--</div>
    </div>
  </div>
  <div class="hdr-r">
    <div class="live-dot"></div>
    <div class="lvl-txt" id="lvl-txt">LV —</div>
    <button class="agents-btn" id="agents-toggle">직원 에이전트 보기</button>

</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT: CHAT -->
  <div id="left">
    <div class="panel-hdr">

      </div>
    </div>
    <div class="feed-list" id="feed-list"><div class="loading">로딩 중…</div></div>
  </div>

  <!-- RIGHT: OFFICE -->
  <div id="right">
    <!-- Office status bar -->
    <div id="office-bar">
      <div class="ob-chip off" id="c-api">API</div>
      <div class="ob-chip off" id="c-bot">BOT</div>
      <div class="ob-chip off" id="c-gh">GH</div>
      <div class="ob-stat">PNL&nbsp;<b id="s-pnl">—</b></div>
      <div class="ob-stat">WIN&nbsp;<b id="s-wr">—</b></div>
      <div class="ob-stat">OPEN&nbsp;<b id="s-open">—</b></div>
      <div class="ob-time" id="ob-time">--:--:--</div>
    </div>
    <!-- Pixel art office -->
    <div id="office-scroll">
      <div id="office-wrap">
        <canvas id="office-canvas"></canvas>
        <div id="char-layer"></div>
      </div>
    </div>
  </div>

</div><!-- /main -->

<!-- MOBILE NAV -->
<nav id="nav">
  <button class="nb on" id="nb-office"><div class="nb-ic">🏢</div><div class="nb-lb">OFFICE</div></button>
  <button class="nb" id="nb-feed"><div class="nb-ic">💬</div><div class="nb-lb">FEED</div></button>
  <button class="nb" id="nb-trading"><div class="nb-ic">📊</div><div class="nb-lb">TRADING</div></button>
  <button class="nb" id="nb-settings"><div class="nb-ic">⚙️</div><div class="nb-lb">SETTINGS</div></button>
</nav>

<!-- OVERLAYS (Trading + Settings) -->
<div id="overlay">
  <!-- Trading -->
  <div id="ov-trading" style="display:none">
    <div class="ov-hdr">
      <div class="ov-ttl">TRADING</div>
      <button class="ov-close" id="ov-close">✕</button>
    </div>
    <div class="ov-body">
      <div class="sec"><div class="sec-t">SIGNALS</div><div id="sigs-wrap"><div class="loading">—</div></div></div>
      <div class="sec">
        <div class="sec-t">PERFORMANCE</div>
        <div class="pgrid">
          <div class="pc"><div class="pl">PNL</div><div class="pv" id="pf-pnl">—</div></div>
          <div class="pc"><div class="pl">WIN %</div><div class="pv" id="pf-wr">—</div></div>
          <div class="pc"><div class="pl">TRADES</div><div class="pv" id="pf-tot">—</div></div>
          <div class="pc"><div class="pl">MAX DD</div><div class="pv" id="pf-mdd">—</div></div>
        </div>
      </div>
      <div class="sec"><div class="sec-t">RECENT TRADES</div><div id="tr-wrap"><div class="loading">—</div></div></div>
    </div>
  </div>
  <!-- Settings -->
  <div id="ov-settings" style="display:none">
    <div class="ov-hdr">
      <div class="ov-ttl">SETTINGS</div>
      <button class="ov-close" id="ov-close2">✕</button>
    </div>
    <div class="ov-body">
      <div class="sec">
        <div class="sec-t">CONNECTION</div>
        <div class="sr"><div class="sr-l">Domain</div><div class="sr-v ok">ayiloncompany.xyz</div></div>
        <div class="sr"><div class="sr-l">API</div><div class="sr-v" id="set-api">—</div></div>
        <div class="sr"><div class="sr-l">BOT</div><div class="sr-v" id="set-bot">—</div></div>
        <div class="sr"><div class="sr-l">Gemini AI</div><div class="sr-v" id="set-ai">—</div></div>
        <div class="sr"><div class="sr-l">OKX</div><div class="sr-v" id="set-okx">—</div></div>
        <div class="sr"><div class="sr-l">24h Cron</div><div class="sr-v ok">매분 실행 중</div></div>
      </div>
      <div class="sec">
        <div class="sec-t">AGENTS — 13명</div>
        <div id="ag-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════
// AGENTS
// ═══════════════════════════════════════
const AGENTS = [
  {id:'CEO',   ic:'👔', team:'Executive',  room:'executive', role:'최고경영자',
   lines:['전략 회의 진행 중','시장 리뷰 완료','팀 지시 전달','Gemini AI 보고서 검토']},
  {id:'IRON',  ic:'📈', team:'전략팀',     room:'trading',   role:'전략 개발',
   lines:['BTC 롱 신호 탐색','ETH 추세 분석','MACD 크로스 확인','볼밴 돌파 포착']},
  {id:'GRID',  ic:'📊', team:'전략팀',     room:'trading',   role:'백테스팅',
   lines:['6개월 백테스트 중','최적 파라미터 탐색','승률 시뮬레이션']},
  {id:'SCOUT', ic:'🔍', team:'리서치팀',   room:'research',  role:'시장 리서치',
   lines:['온체인 데이터 분석','고래 지갑 추적','뉴스 감성 분석']},
  {id:'WARD',  ic:'🛡️', team:'리스크팀',   room:'risk',      role:'리스크 관리',
   lines:['포지션 리스크 점검','손절 라인 업데이트','드로다운 모니터링']},
  {id:'FORGE', ic:'⚙️', team:'개발팀',     room:'dev',       role:'백엔드 개발',
   lines:['Worker 코드 최적화','새 기능 커밋','배포 파이프라인 점검']},
  {id:'ATLAS', ic:'🖥️', team:'인프라팀',   room:'dev',       role:'인프라 관리',
   lines:['Cloudflare 상태 점검','크론잡 정상 실행','D1 DB 백업 완료']},
  {id:'LUNA',  ic:'📣', team:'마케팅팀',   room:'marketing', role:'마케팅',
   lines:['SNS 콘텐츠 제작','브랜드 전략 수립','캠페인 준비']},
  {id:'PIXEL', ic:'🎨', team:'디자인팀',   room:'marketing', role:'UI/UX',
   lines:['대시보드 UI 개선','차트 컴포넌트 제작','모바일 UX 최적화']},
  {id:'ECHO',  ic:'💬', team:'CS팀',       room:'support',   role:'고객 지원',
   lines:['사용자 문의 처리','FAQ 문서 업데이트','피드백 수집 완료']},
  {id:'REX',   ic:'⚖️', team:'법률팀',     room:'support',   role:'법률 자문',
   lines:['규정 준수 검토','금융법 모니터링','이용약관 업데이트']},
  {id:'LEDGER',ic:'📋', team:'세무팀',     room:'finance',   role:'재무/세무',
   lines:['월간 손익 계산','세금 보고서 준비','수익 배분 검토']},
  {id:'SHIELD',ic:'🔒', team:'보안팀',     room:'security',  role:'보안 관리',
   lines:['API 키 보안 점검','침입 탐지 모니터링','취약점 스캔 완료']},
];

// Canvas room bounds (in internal 380x560 px)
const ROOMS = {
  executive: {x1:8,  y1:8,  x2:372, y2:86},
  trading:   {x1:8,  y1:94, x2:186, y2:200},
  research:  {x1:194,y1:94, x2:372, y2:200},
  dev:       {x1:8,  y1:208,x2:186, y2:314},
  risk:      {x1:194,y1:208,x2:372, y2:314},
  marketing: {x1:8,  y1:322,x2:186, y2:416},
  finance:   {x1:194,y1:322,x2:372, y2:416},
  support:   {x1:8,  y1:424,x2:186, y2:518},
  security:  {x1:194,y1:424,x2:372, y2:518},
};
const CW = 380, CH = 528;

// ═══════════════════════════════════════
// DRAW PIXEL ART OFFICE (runs ONCE)
// ═══════════════════════════════════════
function drawOffice() {
  const canvas = document.getElementById('office-canvas');
  canvas.width = CW; canvas.height = CH;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#060606';
  ctx.fillRect(0, 0, CW, CH);

  // Tile grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for(let x=0;x<=CW;x+=16){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke()}
  for(let y=0;y<=CH;y+=16){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke()}

  function room(x,y,w,h,label) {
    ctx.fillStyle='#0a0a0a';
    ctx.fillRect(x,y,w,h);
    ctx.strokeStyle='rgba(255,255,255,0.1)';
    ctx.lineWidth=1;
    ctx.strokeRect(x+.5,y+.5,w-1,h-1);
    ctx.fillStyle='rgba(255,255,255,0.18)';
    ctx.fillRect(x,y,w,1);
    ctx.font='bold 7px "Courier New",monospace';
    ctx.fillStyle='rgba(255,255,255,0.22)';
    ctx.fillText(label.toUpperCase(),x+7,y+11);
  }
  function desk(x,y,w,h){
    ctx.fillStyle='#141414';
    ctx.fillRect(x,y,w,h);
    ctx.strokeStyle='rgba(255,255,255,0.07)';
    ctx.lineWidth=1;
    ctx.strokeRect(x+.5,y+.5,w-1,h-1);
  }
  function monitor(x,y){
    ctx.fillStyle='#0e0e0e';
    ctx.strokeStyle='rgba(255,255,255,0.12)';
    ctx.lineWidth=1;
    ctx.fillRect(x,y,13,10);
    ctx.strokeRect(x+.5,y+.5,12,9);
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.fillRect(x+1,y+1,11,8);
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.fillRect(x+4,y+10,5,3);
    ctx.fillRect(x+1,y+13,11,2);
  }
  function chair(x,y){
    ctx.fillStyle='#111';
    ctx.strokeStyle='rgba(255,255,255,0.06)';
    ctx.lineWidth=1;
    ctx.fillRect(x,y,9,9);
    ctx.strokeRect(x+.5,y+.5,8,8);
    ctx.fillStyle='rgba(255,255,255,0.03)';
    ctx.fillRect(x+1,y+1,7,7);
  }
  function plant(x,y){
    ctx.fillStyle='#0e0e0e';
    ctx.strokeStyle='rgba(255,255,255,0.08)';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(x,y,7,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.fillRect(x-3,y+7,6,5);
    ctx.strokeRect(x-2.5,y+7.5,5,4);
  }
  function shelf(x,y,w,h){
    ctx.fillStyle='#0f0f0f';
    ctx.strokeStyle='rgba(255,255,255,0.07)';
    ctx.lineWidth=1;
    ctx.fillRect(x,y,w,h);
    ctx.strokeRect(x+.5,y+.5,w-1,h-1);
    for(let i=0;i<5;i++){ctx.fillStyle=`rgba(255,255,255,${0.02+i*.01})`;ctx.fillRect(x+1,y+2+i*6,w-2,4);}
  }
  function server(x,y){
    ctx.fillStyle='#0d0d0d';
    ctx.strokeStyle='rgba(255,255,255,0.1)';
    ctx.lineWidth=1;
    ctx.fillRect(x,y,10,26);
    ctx.strokeRect(x+.5,y+.5,9,25);
    for(let i=0;i<5;i++){ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(x+1,y+2+i*5,8,3);}
  }
  function table(cx,cy,rx,ry){
    ctx.fillStyle='#111';
    ctx.strokeStyle='rgba(255,255,255,0.1)';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  }
  function screen(x,y,w,h){
    ctx.fillStyle='#0c0c0c';
    ctx.strokeStyle='rgba(255,255,255,0.12)';
    ctx.lineWidth=1;
    ctx.fillRect(x,y,w,h);
    ctx.strokeRect(x+.5,y+.5,w-1,h-1);
    for(let i=0;i<3;i++){ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(x+2,y+3+i*6,w-4,4);}
  }

  const P=8,G=6,col=(CW-P*2-G)/2;

  // ── CEO ──
  room(P,P,CW-P*2,78,'Executive / CEO');
  table(CW/2,P+46,32,22);
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2-Math.PI/2;chair(CW/2+Math.cos(a)*42-4, P+46+Math.sin(a)*30-4);}
  plant(P+10,P+24);plant(CW-P-18,P+24);
  desk(P+10,P+16,60,18);monitor(P+13,P+12);

  // ── TRADING ──
  const ty=P+78+G;
  room(P,ty,col,106,'Trading Room');
  desk(P+8,ty+30,col-16,18);
  monitor(P+10,ty+26);monitor(P+26,ty+26);monitor(P+42,ty+26);monitor(P+58,ty+26);
  chair(P+14,ty+48);chair(P+30,ty+48);chair(P+46,ty+48);
  screen(P+col-30,ty+14,22,34);

  // ── RESEARCH ──
  room(P+col+G,ty,col,106,'Research Lab');
  shelf(P+col+G+col-20,ty+14,14,36);
  desk(P+col+G+8,ty+30,col-34,18);
  monitor(P+col+G+10,ty+26);monitor(P+col+G+26,ty+26);
  chair(P+col+G+14,ty+48);chair(P+col+G+30,ty+48);
  plant(P+col+G+8,ty+14);

  // ── DEV ──
  const dy=ty+106+G;
  room(P,dy,col,106,'Dev / Infra');
  server(P+8,dy+14);server(P+22,dy+14);
  desk(P+40,dy+30,col-52,18);
  monitor(P+42,dy+26);monitor(P+58,dy+26);
  chair(P+46,dy+48);chair(P+62,dy+48);

  // ── RISK ──
  room(P+col+G,dy,col,106,'Risk Management');
  screen(P+col+G+col-32,dy+14,26,38);
  desk(P+col+G+8,dy+30,col-44,18);
  monitor(P+col+G+10,dy+26);monitor(P+col+G+26,dy+26);
  chair(P+col+G+14,dy+48);chair(P+col+G+30,dy+48);

  // ── MARKETING ──
  const mry=dy+106+G;
  room(P,mry,col,94,'Marketing / Design');
  desk(P+8,mry+28,col-16,16);
  monitor(P+10,mry+24);monitor(P+26,mry+24);
  plant(P+col-18,mry+14);plant(P+col-8,mry+36);
  chair(P+14,mry+44);chair(P+30,mry+44);

  // ── FINANCE ──
  room(P+col+G,mry,col,94,'Finance / Tax');
  shelf(P+col+G+col-22,mry+14,14,34);
  desk(P+col+G+8,mry+28,col-36,16);
  monitor(P+col+G+10,mry+24);
  chair(P+col+G+14,mry+44);

  // ── SUPPORT ──
  const suy=mry+94+G;
  room(P,suy,col,94,'CS / Legal');
  desk(P+8,suy+28,(col/2)-12,16);
  desk(P+(col/2)+4,suy+28,(col/2)-12,16);
  monitor(P+10,suy+24);monitor(P+(col/2)+6,suy+24);
  chair(P+14,suy+44);chair(P+(col/2)+10,suy+44);
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.setLineDash([2,4]);
  ctx.beginPath();ctx.moveTo(P+col/2,suy+14);ctx.lineTo(P+col/2,suy+86);ctx.stroke();
  ctx.setLineDash([]);

  // ── SECURITY ──
  room(P+col+G,suy,col,94,'Security');
  server(P+col+G+col-20,suy+16);
  desk(P+col+G+8,suy+28,col-34,16);
  monitor(P+col+G+10,suy+24);monitor(P+col+G+26,suy+24);

}

function buildChars() {
  const layer = document.getElementById('char-layer');
  AGENTS.forEach(a => {
    const el = document.createElement('div');
    el.className = 'spr' + (a.id==='CEO'?' is-ceo':'');
    el.id = 'spr-' + a.id;
    el.dataset.cx = '20'; el.dataset.cy = '30';
    el.innerHTML = `
      <div class="spr-bub" id="bub-${a.id}">${a.lines[0]}</div>
      <div class="spr-body">${a.ic}</div>
      <div class="spr-shad"></div>
      <div class="spr-lbl">${a.id}</div>`;
    layer.appendChild(el);
  });
  // Spread initial positions after layout
  requestAnimationFrame(() => setTimeout(spreadChars, 60));
}

function getScale() {
  const canvas = document.getElementById('office-canvas');
  return {sx: canvas.offsetWidth/CW, sy: canvas.offsetHeight/CH};
}

function spreadChars() {
  AGENTS.forEach(a => {
    const el = document.getElementById('spr-'+a.id);
    if (!el) return;
    const p = randInRoom(a.room);
    const {sx,sy} = getScale();
    el.dataset.cx = p.x; el.dataset.cy = p.y;
    el.style.transition = 'none';
    el.style.transform = `translate3d(${p.x*sx}px,${p.y*sy}px,0)`;
    el.offsetHeight;
    el.style.transition = '';
    el.classList.add('active');
    setAction(a.id, a.lines[Math.floor(Math.random()*a.lines.length)], false);
  });
}

function randInRoom(roomId) {
  const b = ROOMS[roomId];
  if (!b) return {x:20,y:30};
  const sw = a => a.id==='CEO' ? 28 : 22;
  const sh = 36;
  const pad = 6, topPad = 16;
  const x = b.x1+pad + Math.random()*Math.max(b.x2-b.x1-pad*2-22,1);
  const y = b.y1+topPad + Math.random()*Math.max(b.y2-b.y1-topPad-sh,1);
  return {x,y};
}

// ═══════════════════════════════════════
// WALK (one agent at a time, staggered)
// ═══════════════════════════════════════
let walkPtr = 0;
function walkOne() {
  const a = AGENTS[walkPtr % AGENTS.length];
  walkPtr++;
  const el = document.getElementById('spr-'+a.id);
  if (!el) return;
  const prevX = parseFloat(el.dataset.cx||'20');
  const p = randInRoom(a.room);
  const {sx,sy} = getScale();
  if (p.x < prevX) el.classList.add('face-l'); else el.classList.remove('face-l');
  el.classList.add('walking');
  el.dataset.cx = p.x; el.dataset.cy = p.y;
  el.style.transform = `translate3d(${p.x*sx}px,${p.y*sy}px,0)`;
  setTimeout(()=>el.classList.remove('walking'),2100);
}

// Reposition on resize
window.addEventListener('resize', ()=>{
  const {sx,sy} = getScale();
  AGENTS.forEach(a=>{
    const el = document.getElementById('spr-'+a.id);
    if (!el) return;
    el.style.transition='none';
    el.style.transform=`translate3d(${el.dataset.cx*sx}px,${el.dataset.cy*sy}px,0)`;
    el.offsetHeight;
    el.style.transition='';
  });
});

function renderFeed(items) {
  const list = document.getElementById('feed-list');
  const cnt = document.getElementById('feed-cnt');
  if (!items?.length){list.innerHTML='<div class="loading">—</div>';cnt.textContent='0';return;}
  cnt.textContent = items.length+'';
  list.innerHTML = items.slice(0,50).map(it=>{
    const a = AGENTS.find(x=>x.id===it.agent_id||x.id===it.agent)||{ic:'🤖',team:'SYS'};
    const ts = it.created_at ? new Date(it.created_at*1000).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) : '';
    const isAI = it.is_ai;
    return `<div class="fi${isAI?' ai-msg':''}">
      <div class="fi-av">${a.ic}</div>
      <div class="fi-body">
        <div class="fi-top">
          <div class="fi-who">${it.agent_name||it.agent||'?'}</div>
          <div class="fi-team">${a.team}</div>
          <div class="fi-ts">${ts}</div>
        </div>
        <div class="fi-msg">${it.msg||''}</div>
        ${isAI?'<span class="fi-tag">✦ Gemini</span>':''}
      </div>
    </div>`;
  }).join('');
  // update agent bubbles from recent feed
  items.slice(0,8).forEach(it=>{
    const id = it.agent_id||it.agent;
    if (id && AGENTS.find(a=>a.id===id))
      setAction(id,(it.msg||'').slice(0,60),false,!!it.is_ai);
  });
}

// ═══════════════════════════════════════
function renderSigs(sigs){
  const w=document.getElementById('sigs-wrap');
  if(!sigs?.length){w.innerHTML='<div class="loading">—</div>';return;}
  w.innerHTML=sigs.slice(0,5).map(s=>{
    const dir=(s.direction||s.side||'HOLD').toUpperCase();
    return `<div class="row">
      <span class="row-s">${s.symbol||s.sym||'—'}&nbsp;<span style="font-size:8px;color:rgba(255,255,255,.3)">${s.tf||''}</span></span>
      <span class="row-d">${dir}</span>
    </div>`;
  }).join('');
}
function renderPerf(p){
  if(!p)return;
  const f=v=>(v>=0?'+':'')+v.toFixed(2)+'%';
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  if(p.totalPnl!=null){s('pf-pnl',f(p.totalPnl));s('s-pnl',f(p.totalPnl));}
  if(p.winRate!=null){const wr=(p.winRate*100).toFixed(1)+'%';s('pf-wr',wr);s('s-wr',wr);}
  if(p.totalTrades!=null||p.total!=null)s('pf-tot',p.totalTrades||p.total||0);
  if(p.maxDrawdown!=null)s('pf-mdd',f(-Math.abs(p.maxDrawdown)));
}
function renderTrades(trades){
  const w=document.getElementById('tr-wrap');
  if(!trades?.length){w.innerHTML='<div class="loading">—</div>';return;}
  w.innerHTML=trades.slice(0,8).map(t=>{
    const pnl=t.pnl??t.pnl_usdt??t.realizedPnl;
    const ps=pnl!=null?(pnl>=0?'+':'')+pnl.toFixed(2)+'%':'—';
    return `<div class="row">
      <span class="row-s">${t.symbol||t.sym||'—'}</span>
      <span class="row-d">${(t.side||'LONG').toUpperCase()}</span>
      <span class="row-p">${ps}</span>
    </div>`;
  }).join('');
}

function ago(d){const s=Math.floor((Date.now()-d)/1000);return s<60?s+'s':s<3600?Math.floor(s/60)+'m':s<86400?Math.floor(s/3600)+'h':Math.floor(s/86400)+'d';}
async function loadGH(){
  const chip=document.getElementById('c-gh');
  for(const {owner,repo} of [{owner:'wldnjswldnjs00-ui',repo:'ayilon-virtual-office'},{owner:'wldnjswldnjs00-ui',repo:'oracletrading'}]){
    try{
      const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/commits?per_page=3`);
      if(!r.ok)throw 0;
      const cs=await r.json();
      chip.className='ob-chip ok';
      if(cs[0]){
        const m=cs[0].commit.message.split('\n')[0];
        const w=ago(new Date(cs[0].commit.author.date));
        if(repo==='ayilon-virtual-office'){
          setAction('FORGE','commit: '+m.slice(0,40),false,false);
          setAction('ATLAS',repo+' '+w+' ago 배포',false,false);
        }
      }
    }catch(_){chip.className='ob-chip warn';}
  }
}

// ═══════════════════════════════════════
async function loadAll(){
  const capi=document.getElementById('c-api');
  const cbot=document.getElementById('c-bot');
  try{
    const d=await(await fetch('/api/feed')).json();
    const items=d.items||d||[];
    renderFeed(items);
    capi.className='ob-chip ok';
  }catch(_){capi.className='ob-chip warn';renderFeed([]);}
  try{
    const d=await(await fetch('/api/signals')).json();
    const sigs=d.signals||d||[];
    renderSigs(sigs);
    if(sigs[0]){setAction('IRON',(sigs[0].symbol||'BTC')+' '+(sigs[0].direction||'HOLD')+' 신호',true,false);}
  }catch(_){renderSigs([]);}
  try{
    const d=await(await fetch('/api/performance')).json();
    renderPerf(d.performance||d);
    const p=d.performance||d;
    if(p.totalPnl!=null){const el=document.getElementById('s-pnl');if(el)el.textContent=(p.totalPnl>=0?'+':'')+p.totalPnl.toFixed(2)+'%';}
    if(p.winRate!=null){const el=document.getElementById('s-wr');if(el)el.textContent=(p.winRate*100).toFixed(1)+'%';}
  }catch(_){}
  try{
    const d=await(await fetch('/api/trades')).json();
    const trades=d.trades||d||[];
    renderTrades(trades);
    const open=trades.filter(t=>t.status==='open'||t.open).length;
    const el=document.getElementById('s-open');if(el)el.textContent=open;
  }catch(_){}
  try{
    const d=await(await fetch('/api/state')).json();
    const run=d.running||d.status==='running';
    cbot.className='ob-chip '+(run?'ok':'warn');
    document.getElementById('set-bot').textContent=run?'running':'idle';
    document.getElementById('set-bot').className='sr-v'+(run?' ok':'');
    document.getElementById('set-ai').textContent=d.aiEnabled?'Gemini 활성화':'미설정';
    document.getElementById('set-ai').className='sr-v'+(d.aiEnabled?' ok':'');
    const gem=document.getElementById('gem-badge');
    gem.style.color=d.aiEnabled?'rgba(255,255,255,.5)':'rgba(255,255,255,.15)';
    if(d.level){
      document.getElementById('lvl-txt').textContent='LV '+d.level;
      document.querySelectorAll('[id^="alv-"]').forEach(e=>e.textContent='LV '+(d.agentXp?Math.floor((d.agentXp[e.id.replace('alv-','')]||0)/10)+1:1));
    }
    if(d.aiEnabled)setAction('CEO','Gemini AI 연결 완료 · 자율 운영 중',false,true);
  }catch(_){cbot.className='ob-chip warn';}
  ['set-api'].forEach(id=>{const e=document.getElementById(id);if(e){e.textContent='ok';e.className='sr-v ok';}});
}

function tick(){
  const now=new Date();
  const t=now.toLocaleTimeString('ko-KR');
  document.getElementById('hdr-time').textContent=t.slice(0,5);
  document.getElementById('ob-time').textContent=t;
  const day=Math.floor((now-START)/(1000*60*60*24))+1;

}
